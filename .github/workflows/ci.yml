name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify generated tracked outputs
        run: git diff --exit-code -- .agents .claude .cursor .gemini .github/skills .kiro .opencode .pi .qoder .rovodev .trae .trae-cn plugin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: impeccable-dist
          path: dist/
          retention-days: 7